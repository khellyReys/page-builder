name: Auto Merge

# Automatically enables GitHub's built-in auto-merge on every PR.
# The actual merge fires ONLY when ALL required status checks pass:
#   ✅  CI / Build & Type Check
#   ✅  Netlify deploy check (added via Netlify GitHub App)
on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge (squash)
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
